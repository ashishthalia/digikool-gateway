server:
  port: ${PORT:6061}
  forward-headers-strategy: framework
  shutdown: graceful
  reactive:
    session:
      timeout: 30m
      cookie:
        same-site: LAX

spring:
  application:
    name: gateway

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    check-template-location: true
    cache: false

  web-flux:
    problem details:
      enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowed-origins: 
                  - "http://localhost:3000"
                  - "https://digikool.in"
                  - "https://www.digikool.in"
                  - "https://digikool.com"
                  - "https://www.digikool.com"
                allowed-methods: 
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowed-headers: "*"
                allow-credentials: true
                max-age: 3600
          routes:
            - id: auth-service
              uri: ${AUTH_URI:http://localhost:9000}
              predicates:
                - Path=/auth/**
              filters:
                - TokenRelay
                - StripPrefix=1
            - id: attendance-service
              uri: ${ATTENDANCE_URI:http://attendance-service.gateway.svc.cluster.local:8087}
              predicates:
                - Path=/api/attendance/**,/api/sessions/**,/api/records/**
              filters:
                - StripPrefix=0
            - id: attendance-redirect
              uri: ${ATTENDANCE_URI:http://attendance-service.gateway.svc.cluster.local:8087}
              predicates:
                - Path=/attendance/**
              filters:
                - StripPrefix=1

  security:
    oauth2:
      client:
        registration:
          gateway-client:
            client-id: gateway-client
            client-secret: secret
            scope: openid,read,write
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            provider: gateway-provider
            client-authentication-method: client_secret_basic
        provider:
          gateway-provider:
            authorization-uri: ${AUTH_BASE_URL:http://localhost:9000}/oauth2/authorize
            token-uri: ${AUTH_BASE_URL:http://localhost:9000}/oauth2/token
            user-info-uri: ${AUTH_BASE_URL:http://localhost:9000}/oauth2/userinfo
            user-name-attribute: sub
            jwk-set-uri: ${AUTH_BASE_URL:http://localhost:9000}/oauth2/jwks

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.web: INFO
    org.springframework.web.reactive.function.client: TRACE
    org.springframework.security.oauth2.client: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      probes.enabled: true
  metrics:
    tags:
      application: ${spring.application.name}