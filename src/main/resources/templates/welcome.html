<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - DigiKool Gateway</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }
        
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .user-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #495057;
            min-width: 120px;
        }
        
        .info-value {
            color: #212529;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
            </svg>
        </div>
        
        <h1>Welcome to DigiKool!</h1>
        <p class="subtitle">You have successfully logged in</p>
        
        <div class="user-info">
            <div class="info-row">
                <span class="info-label">User ID:</span>
                <span class="info-value" th:text="${userContext?.userId ?: 'N/A'}">N/A</span>
            </div>
            <div class="info-row">
                <span class="info-label">Username:</span>
                <span class="info-value" th:text="${userContext?.username ?: 'N/A'}">N/A</span>
            </div>
            <div class="info-row" th:if="${userContext?.firstName}">
                <span class="info-label">Name:</span>
                <span class="info-value" th:text="${userContext.firstName}">N/A</span>
            </div>
            <div class="info-row" th:if="${userContext?.userEmail}">
                <span class="info-label">Email:</span>
                <span class="info-value" th:text="${userContext.userEmail}">N/A</span>
            </div>
            <div class="info-row" th:if="${userContext?.schoolId}">
                <span class="info-label">School ID:</span>
                <span class="info-value" th:text="${userContext.schoolId}">N/A</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status:</span>
                <span class="status-badge">✓ Authenticated</span>
            </div>
        </div>
        
        <div class="actions">
            <a href="/oauth2/logout" class="btn btn-secondary" onclick="event.preventDefault(); logout()">Logout</a>
            <a href="/api/students" class="btn btn-primary">Go to Dashboard</a>
        </div>
    </div>
    
    <script>
        function logout() {
            fetch('/oauth2/logout', {
                method: 'POST',
                credentials: 'include'
            }).then(() => {
                window.location.href = '/oauth2/authorize';
            }).catch(err => {
                console.error('Logout failed:', err);
                alert('Logout failed. Please try again.');
            });
        }
    </script>
</body>
</html>
